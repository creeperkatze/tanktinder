name: Build and publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      - name: 🧰 Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: ⚙️ Generate Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
            images: ghcr.io/creeperkatze/tanktinder
            labels: |
                org.opencontainers.image.title=tanktinder
                org.opencontainers.image.description=Tinder für Tankstellen
                org.opencontainers.image.source=https://github.com/creeperkatze/tanktinder
            annotations: |
                org.opencontainers.image.title=tanktinder
                org.opencontainers.image.description=Tinder für Tankstellen
      - name: 🔑 Login to GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: 🔨 Build and push
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
          cache-from: type=registry,ref=ghcr.io/creeperkatze/tanktinder:main
          cache-to: type=inline
          
