name: Build and publish

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 🧰 Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: ⚙️ Generate Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
            images: ghcr.io/creeperkatze/tanktinder
            labels: |
                org.opencontainers.image.title=tanktinder
                org.opencontainers.image.description=Tinder für Tankstellen
                org.opencontainers.image.source=https://github.com/creeperkatze/tanktinder
            annotations: |
                org.opencontainers.image.title=tanktinder
                org.opencontainers.image.description=Tinder für Tankstellen
      - name: 🔑 Login to GitHub Packages
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: 🔨 Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          annotations: ${{ steps.docker_meta.outputs.annotations }}
          cache-from: type=registry,ref=ghcr.io/creeperkatze/tanktinder:main
          cache-to: type=inline
          
